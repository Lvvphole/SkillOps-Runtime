# coding-pr-gate — the v0 reference loop.
#
# Converts coding-agent output into a verifier-owned, PR-gated delivery run.
# The manifest is the source of truth: the runtime executes only these steps,
# only these terminal states are allowed, and each step declares the evidence
# it must produce. Release-gated steps (release: true) run only with --release.
loop_id: coding-pr-gate
name: Coding PR Gate
version: "0"
max_iterations: 500
default_branch: main

skills:
  - coding-pr-gate

forbidden_paths:
  - artifacts/
  - .git/
  - "**/__pycache__/**"
  - "*.env"
  - secrets/

terminal_states:
  - PASS_TERMINAL
  - PASS_CANDIDATE_PR_CREATED
  - FAIL_RECOVERABLE
  - FAIL_PATCH_PR_CREATED
  - ESCALATED_WITH_BLOCKER

steps:
  - id: repo-path
    owner: runtime
    handler: record_repo_path
    description: Confirm the repository checkout path exists.
    produces: [repo-path-confirmation.txt]

  - id: remote-verify
    owner: runtime
    handler: verify_remote
    description: Verify git remote matches the required GitHub repository.
    produces: [git-remote-verification.txt]
    params:
      expect_substring: SkillOps-Runtime

  - id: source-docs
    owner: runtime
    handler: source_doc_inspection
    description: Inspect README/AGENTS/pyproject/Makefile/CI before command choice.
    produces: [source-doc-inspection.md]

  - id: command-discovery
    owner: runtime
    handler: command_discovery
    description: Discover validation/test commands from source docs only.
    produces: [command-discovery.md]

  - id: git-status
    owner: runtime
    handler: git_status
    description: Capture working-tree status before changes.
    produces: [git-status-before.txt]

  - id: branch-safety
    owner: runtime
    handler: branch_safety
    description: Record branch identity; forbid direct default-branch writes.
    produces: [branch-safety.txt]

  - id: pull-sync
    owner: runtime
    handler: pull_sync
    description: Fetch/sync the branch or record proof it is current.
    produces: [pull-sync.txt]

  - id: manifest-validate
    owner: verifier
    handler: validate_manifest
    description: Re-validate the LoopSpec manifest as a gate.
    produces: [loop-validate.log]

  - id: tests
    owner: executor
    handler: run_tests
    description: Run the discovered test command.
    produces: [test-results.log]
    params:
      command: ["python", "-m", "pytest", "-q"]

  - id: conflict-scan
    owner: verifier
    handler: conflict_scan
    description: Fail if tracked files contain conflict markers.
    produces: [conflict-marker-scan.txt]

  - id: capture-diff
    owner: executor
    handler: capture_diff
    description: Capture the git diff as the implementation evidence.
    produces: [final-diff.patch]

  - id: verify
    owner: verifier
    handler: verifier_report
    description: Verify artifacts, checkpoints, decisions, conflicts, secrets.
    produces: [verification-report.md]

  - id: evaluate
    owner: evaluator
    handler: evaluator_report
    description: Score verified artifacts against the loop contract.
    produces: [evaluation-report.md]

  # ---- release-gated (only with --release) ----
  - id: release-commit
    owner: executor
    handler: release_commit
    release: true
    description: Record post-commit clean working-tree status.
    produces: [post-commit-status.txt]

  - id: release-push
    owner: executor
    handler: release_push
    release: true
    description: Push the feature branch; hard-stop on failure.
    produces: [push-output.txt]

  - id: release-pr
    owner: executor
    handler: release_pr
    release: true
    description: Record PR URL and PR documentation (no auto-merge in v0).
    produces: [pr-url.txt, pr-body.md]
